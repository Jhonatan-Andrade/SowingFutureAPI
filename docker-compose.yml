version: '3.8'
services:
  db:
    image: postgres:14
    container_name: sowing_future_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - pgdata:/var/lib/postgresql
networks:
  app-network:
    driver: bridge
volumes:
  pgdata:
