version: '3.8'
services:
  db:
    image: postgres:14
    container_name: sowing_future_postgres
    restart: always
    environment:
      POSTGRES_USER: *****
      POSTGRES_PASSWORD: *****
      POSTGRES_DB: sowing_future_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
